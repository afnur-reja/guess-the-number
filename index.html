<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Enter a guess between 0 to 100</p>
    <input type="number" name="" id="guess" placeholder="Enter a number" autocomplete="off" min="0" max="100" required autofocus>
    <button class="submit-btn">Submit</button>
    <button class="start-btn">Start Game</button>
    <p class="massage">you got it! congrats</p>
    <p class="user-guesses">your guesses : 12, 34</p>
    <script src="script.js"></script>
</body>
</html>
